<section id="projects" class="py-0 mb-8">
    <div class="section-container">
        <h1 class="section-subtitle text-white uppercase font-semibold mb-6">
            <span class="text-xs bg-pink-500 rounded-full px-1.5 mr-4"></span> All Projects
        </h1>
            <div class="grid lg:grid-cols-3 gap-6 items-center">           
            @for(project of projects; track project.title){
                <div class="glass-card">
                    <div class="min-h-24 p-0.5 flex items-center justify-center">
                        <img class="inline-flex w-full h-full rounded-t-xl" src="..//public/otcmvs-db.png">
                    </div>
                    <div class="p-6">
                        <h1 class="section-subtitle font-semibold capitalize text-white">{{ project.title }}</h1>
                        <p class="leading-6 text-zinc-400">{{ project.description }}
                        </p>
                    </div>
                    <div class="px-6">
                        <ul class="flex gap-4 items-center text-white leading-6">
                            <li class="tech-badge">{{ project.badge[0] }}</li>
                            <li class="tech-badge">{{ project.badge[1] }}</li>
                            <li class="tech-badge">{{ project.badge[2] }}</li>
                        </ul>
                    </div>
                    <div class="grid grid-cols-2 p-6 gap-4 border-t-2 card-hover justify-items-center items-center border-[#ffffff14] mt-6">
                        <a class="w-full border-r-2 border-[#ffffff14] card-hover text-center" href="#" src="">{{ project.button[0] }}</a>
                        <a class="w-full text-center card-hover" href="#" src="">{{ project.button[1] }}</a>
                    </div>
                </div>
            }
            </div>
    </div>
</section>
