<div class="glass-card p-6"> 
        <h1 class="section-subtitle text-white uppercase font-semibold mb-6">
            <span class="text-xs bg-pink-500 rounded-full px-1.5 mr-4"></span>
            Github Stats
        </h1>  

        <div class="grid grid-cols-1 gap-2 items-center justify-items-center mb-4">
            <div>
                <img [src]="profile?.avatar_url" class="w-24 h-24 rounded-full">
            </div>
            <h2>{{profile?.name}}</h2>
            <p>{{profile?.bio}}</p>
            <p class="text-sm"><a  [href]="profile?.html_url" class="hover:text-pink-500 hover:underline" target="_blank">{{profile?.html_url}}</a></p>
        </div>
       
        <div class="glass-card grid lg:grid-cols-3 gap-4 mb-6 divide-[#ffffff14] divide-x divide-default">     
            <div class="p-6 items-center justify-items-center">
                <h3 class="text-base font-bold">
                    <!-- {{profile?.public_repos}} -->
                     <app-counter
                    [end]="profile?.public_repos ?? 0"
                    suffix="+">
                </app-counter>
                </h3>
                <p class="text-zinc-400 mt-2 text-nowrap text-center">
                    Repositories
                </p>
            </div>            
            <div class="p-6 items-center justify-items-center">
                <h3 class="text-base font-bold">
                    <app-counter
                    [end]="152"
                    suffix="+">
                    </app-counter>
                </h3>
                <p class="text-zinc-400 mt-2">
                    Contributions
                </p>
            </div>
            <div class="p-6 items-center justify-items-center">
                <h3 class="text-base font-bold">
                    <app-counter
                    [end]="languageStats().length"
                    suffix="+">
                    </app-counter>
                </h3>
                <p class="text-zinc-400 mt-2">
                    Languages
                </p>
            </div>         
        </div>
        <!-- <div class="glass-card grid lg:grid-cols-4 gap-4 mb-16 divide-[#ffffff14] divide-x divide-default"> 
            @for(stat of stats; track stat.title){      
            <div class="p-6 items-center justify-items-center">
                <h3 class="text-base font-bold">
                    {{ stat.value }}
                </h3>
                <p class="text-zinc-400 mt-2">
                    {{ stat.title }}
                </p>
            </div>
            }
        </div> -->
        <div class="space-y-5">
            <h3>Top Languages</h3>
            @for(language of languageStats(); track language.name){
                <div class="flex ps-4 mt-4 gap-12 items-center justify-items-between">
                    <div class="w-24 font-medium">
                        <span>{{language.name}}</span>
                    </div>
                    <div class="flex-1 h-2 rounded-full bg-zinc-800">
                        <div class="language-bar h-full rounded-full transition-all duration-1000" [style.background]="language.color" [style.width.%]="language.percentage"></div> 
                    </div>
                     <div class="w-10 text-right">
                        {{language.percentage}}%
                    </div>
                    <!-- <div class="w-full h-2 rounded-full" [ngClass]="language.bgColor">
                        <div class="h-2 rounded-full" [ngClass]="language.value" [ngClass]="language.topColor"></div>
                    </div>
                    <span>{{ language.value }}</span> -->
                </div> 
            }
                      
        </div>    
</div>
