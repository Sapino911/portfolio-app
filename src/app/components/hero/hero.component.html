<section class="min-h-screen flex items-center">
  <div class="section-container">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <div>
        <span
          class="inline-block px-4 py-2 rounded-full bg-sky-500/10 text-sky-400 mb-6">
           Hi, I'm
        </span>
         <h1 class="text-6xl font-bold mb-6">
          Masego Letsapa 
        </h1>
        <h3 class="section-subtitle font-bold text-white">
           Full Stack <span class="text-sky-400"> Developer </span> | Business <span class="text-sky-400"> Analyst </span>
        </h3>
        <p class="text-slate-400 text-xl mb-8">
          Building scalable web applications with Angular,
          ASP.NET Core, SQL Server and modern technologies.
        </p>
        <div class="flex gap-4 mb-6">
          <button class="primary-btn">
            View Projects
          </button>
          <button class="secondary-btn">
            Download CV
          </button>
        </div>
        <div class="flex gap-4 mb-6">
          @for( badge of badges; track badge.title){ 
            <button class="tech-badge">
              {{ badge.title }}
            </button>
          }
        </div>
      </div>
      <div class="hero-glow">
        <div class="z-50 flex justify-center">
        <div
          class="z-10 p-2 w-96 h-96 rounded-full
                 bg-gradient-to-br
                 from-pink-500
                 to-sky-500/50
                 border border-sky-500/20 ">
                 <img class="w-full h-full rounded-full" src="..//public/me.jpg">
        </div>
        
      </div>
      </div>
    </div>
  </div>
</section>
