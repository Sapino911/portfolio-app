<section class="min-h-[85vh] flex items-center">
  <div class="section-container">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <div>
        <span
          class="inline-block px-4 py-2 rounded-full bg-sky-500/10 text-sky-400 mb-6">
           Hi, I'm
        </span>
         <h1 class="text-7xl lg:text-8xl font-bold mb-6">
          Masego <span class="text-pink-500">Letsapa</span> 
        </h1>
        <h3 class="section-title text-2xl font-bold text-white">
           Software <span class="text-sky-400"> Developer </span> | Business <span class="text-yellow-400"> Analyst </span>
        </h3>
        <p class="text-zinc-400 text-xl mb-8">
          I Build scalable web applications and solve real business problems
          through technology and data-driven solutions.
        </p>
        <div class="flex gap-4 mb-6">
          <button class="primary-btn">
            View My Work
          </button>
          <button class="secondary-btn">
            Download CV
          </button>
        </div>
        <div class="flex gap-4 mb-6">
          @for( badge of badges; track badge.title){ 
            <button class="tech-badge">
              {{ badge.title }}
            </button>
          }
        </div>
        <div class="flex gap-8 mt-6">
      <div>
        <h4 class="text-pink-500 text-2xl font-bold">8+</h4>
        <p class="text-zinc-400">Modules</p>
      </div>

      <div>
        <h4 class="text-pink-500 text-2xl font-bold">20+</h4>
        <p class="text-zinc-400">Features</p>
      </div>

      <div>
        <h4 class="text-pink-500 text-2xl font-bold">100%</h4>
        <p class="text-zinc-400">Responsive</p>
      </div>

      </div> 
      </div>
      <div class="hero-glow profile-ring mt-12">
        <div class="z-50 flex justify-center">
            <div
              class="z-10 p-2 w-96 h-96 rounded-full
                    bg-gradient-to-br
                    from-pink-500
                    to-sky-500/50
                    border border-sky-500/20 ">
                    <img class="w-full h-full rounded-full" src="..//public/me.jpg">
            </div>     
          </div>
      </div>
      
    </div>
  </div>
</section>
